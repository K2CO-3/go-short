# Nginx 反向代理配置 - 按 URL 分流
# 支持 HTTP (80) 和 HTTPS (443)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # 上游：跳转服务（短链接 302 重定向，高流量）
    upstream redirect_backend {
        least_conn;
        server redirect-service:8080 max_fails=3 fail_timeout=30s;
    }

    # 上游：API 服务（管理后台、鉴权、业务逻辑）
    upstream api_backend {
        least_conn;
        server api-service:8080 max_fails=3 fail_timeout=30s;
    }

    # HTTP (80) 和 HTTPS (443) 共用以下配置
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # /code/:code -> 跳转服务（短链接访问）
        location /code/ {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        location /health {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /metrics {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        

        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location / {
            return 404;
        }
    }

    # HTTPS (443)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # SSL 证书（自签名或 Let's Encrypt）
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # 与 HTTP 相同的 location 配置
        location /code/ {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }

        location /health {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /metrics {
            proxy_pass http://redirect_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location / {
            return 404;
        }
    }
}
