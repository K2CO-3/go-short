services:
  # ----------------------------
  # 接入层 (Nginx 反向代理)
  # ----------------------------
  nginx:
    image: nginx:alpine
    container_name: goshort-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - redirect-service
      - api-service
    networks:
      - goshort-net

  # ----------------------------
  # 基础设施层 (Database & Cache)
  # ----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: goshort-db
    restart: always
    environment:
      POSTGRES_USER: cmh
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: goshort
    ports:
      - "5432:5432" # 暴露给宿主机的数据库工具连接用
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - goshort-net

  redis:
    image: redis:alpine
    container_name: goshort-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - goshort-net

  kafka:
    image: bitnami/kafka:3.8
    container_name: goshort-kafka
    restart: always
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - goshort-net

  # ----------------------------
  # 应用服务层 (Microservices)
  # ----------------------------
  
  # 1. 跳转服务 (核心读服务) - 模拟 8082 端口
  redirect-service:
    build:
      context: ..            # 上下文是项目根目录
      dockerfile: deploy/Dockerfile.redirect
    container_name: goshort-redirect
    restart: always
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8082:8080"            # 宿主机 8082 -> 容器 8080
    environment:
      - APP_ENV=production
      - DB_DSN=host=postgres user=cmh password=123456 dbname=goshort port=5432 sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - KAFKA_BROKERS=kafka:9092
    networks:
      - goshort-net

  # 2. API 服务 (管理后台) - 模拟 8081 端口
  api-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: goshort-api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8081:8080"          # 宿主机 8081 -> 容器 8080
    environment:
      - APP_ENV=production
      - DB_DSN=host=postgres user=cmh password=123456 dbname=goshort port=5432 sslmode=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=youwillneverknow
      - BASE_URL=http://localhost
    networks:
      - goshort-net

  # 3. Worker 服务 (异步处理) - 无端口
  worker-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    container_name: goshort-worker
    restart: always
    depends_on:
      - postgres
      - kafka
    environment:
      - APP_ENV=production
      - DB_DSN=host=postgres user=cmh password=123456 dbname=goshort port=5432 sslmode=disable
      - KAFKA_BROKERS=kafka:9092
    networks:
      - goshort-net

# 定义持久化卷
volumes:
  pg_data:
  redis_data:
  kafka_data:

# 定义内部网络
networks:
  goshort-net:
    driver: bridge